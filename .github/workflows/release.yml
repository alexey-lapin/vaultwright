name: Release

# Builds the vault/warden stub matrix + SHA-256 manifest and the per-host vaultwright
# CLI (embedding host stubs + manifest + version), then publishes them to a GitHub
# Release. Triggered by pushing a v* tag, or manually via workflow_dispatch with a tag.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish (e.g. v0.0.2)"
        required: true

permissions:
  contents: write # create the GitHub release + push the formula branch
  pull-requests: write # open + merge the formula-bump PR

jobs:
  release:
    runs-on: ubuntu-latest
    # On a tag push this is the tag; on manual dispatch it's the provided input.
    env:
      VERSION: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      # 1. Cross-compile the stub matrix and emit dist/SHA256SUMS.
      - name: Build stub matrix + manifest
        run: ./scripts/build-stubs.sh
        # → dist/stubs/<role>/<os>_<arch>.stub  and  dist/SHA256SUMS

      # 2. Build the vaultwright CLI per host platform, embedding that host's stubs +
      #    the manifest + the version (see scripts/build-release.sh).
      - name: Build vaultwright CLI
        run: ./scripts/build-release.sh # reads $VERSION from the job env

      # 3. Publish to the release using the built-in gh CLI (no third-party action).
      #    Stage flat-named copies first: stubs live under stubs/<role>/..., whose
      #    basenames collide, so rename to "<role>-<os>_<arch>.stub" — the unique
      #    asset name the downloader fetches from releases/download/<tag>/.
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mkdir -p dist/assets
          cp dist/SHA256SUMS dist/assets/
          cp dist/vaultwright-* dist/assets/ 2>/dev/null || true
          while IFS= read -r f; do
            rel=${f#dist/stubs/}              # e.g. vault/darwin_arm64.stub
            cp "$f" "dist/assets/${rel/\//-}" # → vault-darwin_arm64.stub
          done < <(find dist/stubs -type f -name '*.stub' | sort)
          # checksums.txt covers the downloadable CLI binaries (SHA256SUMS is the
          # stub trust root, not the CLI), so a curl/browser install can be verified.
          ( cd dist/assets && \
            { command -v sha256sum >/dev/null && sha256sum vaultwright-* || shasum -a 256 vaultwright-*; } \
              > checksums.txt )
          # --target creates the tag at this commit on manual dispatch; ignored when
          # the tag already exists (the tag-push case).
          gh release create "$VERSION" \
            --title "$VERSION" \
            --target "$GITHUB_SHA" \
            --generate-notes \
            dist/assets/*

      # 4. Track the latest release in the Homebrew formula (this repo is its own tap).
      #    Regenerated from the freshly built dist/ binaries. main is protected (PR-only)
      #    and the default GITHUB_TOKEN can't bypass the ruleset on a personal repo, so
      #    rather than pushing to main we open a formula PR and squash-merge it — the
      #    ruleset requires a PR but no approvals/checks, which GITHUB_TOKEN can satisfy.
      #    The bump is labeled ignore-for-release so it stays out of the next release's
      #    notes. The release above already succeeded; a failure here only leaves the
      #    formula to be regenerated by hand.
      - name: Update Homebrew formula via PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main   # dist/ is gitignored, so it survives
          ./scripts/update-formula.sh        # reads $VERSION + dist/vaultwright-*
          if git diff --quiet -- Formula/vaultwright.rb; then
            echo "formula already up to date"; exit 0
          fi
          branch="release/formula-$VERSION"
          git checkout -B "$branch"
          git add Formula/vaultwright.rb
          git commit -m "release: update Homebrew formula to $VERSION"
          git push -f origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "release: update Homebrew formula to $VERSION" \
            --body "Automated formula bump for $VERSION." \
            --label ignore-for-release
          # No required checks, so the PR is mergeable at once; retry to absorb the
          # brief lag before GitHub computes mergeability.
          for i in 1 2 3 4 5; do
            gh pr merge "$branch" --squash --delete-branch && break
            echo "merge not ready, retrying in 5s..."; sleep 5
          done
