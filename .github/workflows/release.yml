name: Release

# The release job: runs GoReleaser, which builds the vault/warden stub matrix + the
# per-host vaultwright CLIs (via scripts/build-{stubs,release}.sh in before.hooks),
# publishes the GitHub Release with categorized notes, and pushes the Homebrew formula
# to alexey-lapin/homebrew-tap. See .goreleaser.yaml.
#
# Two entry points:
#   - push a v* tag directly (human / PAT push), or
#   - call this reusable workflow from another one (release-dispatch.yml) with `tag`.
# GoReleaser needs the tag to already exist; both entry points satisfy that.

on:
  push:
    tags: ["v*"]
  workflow_call:
    inputs:
      tag:
        description: "Release tag to build (vX.Y.Z); must already exist"
        type: string
        required: true
    secrets:
      TAP_GITHUB_TOKEN:
        description: "Fine-grained PAT (Contents: RW) for alexey-lapin/homebrew-tap"
        required: true

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }} # the tag to release
          fetch-depth: 0 # full history + tags for GoReleaser

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2" # pin the GoReleaser binary to latest 2.x
          args: release --clean
        # GITHUB_TOKEN is not auto-exported to steps; GoReleaser reads it from the env to
        # authenticate the release API. TAP_GITHUB_TOKEN authorizes the homebrew-tap push.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # release on this repo
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }} # formula push to homebrew-tap
