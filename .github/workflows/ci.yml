name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      # The committed *.stub files are tiny placeholders; go build/test embed them
      # fine (tests never run the sealed binaries), so no `make` is needed here.
      - name: gofmt
        run: test -z "$(gofmt -l cmd internal)" || (gofmt -l cmd internal; exit 1)

      - name: vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        run: go test ./...
